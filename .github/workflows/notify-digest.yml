name: Notify subscribers on new digest

on:
  push:
    branches: [main]
    paths:
      - 'news-archive/digest-*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new digest file
        id: digest
        run: |
          FILE=$(git diff --name-only --diff-filter=AM HEAD^ HEAD -- 'news-archive/digest-*.md' | head -1)
          if [ -z "$FILE" ]; then
            echo "No new digest file in this push. Skipping."
            echo "file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DATE=$(basename "$FILE" .md | sed 's/digest-//')
          REPO_URL="https://github.com/${{ github.repository }}"
          COMMIT_URL="${REPO_URL}/commit/${{ github.sha }}"
          FILE_URL="${REPO_URL}/blob/main/${FILE}"

          # Extract summary block (lines 1..first '## Кейсы' or first 40 lines)
          awk 'NR==1 || /^## /{c++} c<2 {print}' "$FILE" | head -40 > summary_block.txt

          {
            echo "Здравствуйте!"
            echo ""
            echo "Свежий дайджест SAP-news за ${DATE} готов."
            echo ""
            echo "--- Краткое содержание ---"
            cat summary_block.txt
            echo ""
            echo "---"
            echo ""
            echo "Полный дайджест (markdown): ${FILE_URL}"
            echo "Коммит:                     ${COMMIT_URL}"
            echo ""
            echo "— Weekly SAP news bot"
          } > email_body.txt

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Send email via Gmail SMTP
        if: steps.digest.outputs.file != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "SAP news digest — ${{ steps.digest.outputs.date }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: SAP News Bot <${{ secrets.GMAIL_USER }}>
          body: file://email_body.txt
          attachments: ${{ steps.digest.outputs.file }}
